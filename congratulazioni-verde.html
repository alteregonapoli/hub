<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ALTER EGO — Congratulations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --nero: #0A0A0A;
    --viola: #3B1F6A;
    --lilla: #7B4FC9;
    --crema: #F2EDE4;
    --pr: #3D9970;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; }
  body {
    background: var(--nero);
    color: var(--crema);
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    min-height: 100dvh;
    display:flex;
    align-items:center;
    justify-content:center;
    position: relative;
    overflow: hidden;
  }
  body::after {
    content:'';
    position: fixed;
    top:-20vh; left:50%; transform:translateX(-50%);
    width:90vw; height:60vh;
    background: radial-gradient(ellipse at center, rgba(var(--pr-rgb),0.24) 0%, rgba(var(--pr-rgb),0.05) 45%, transparent 70%);
    pointer-events:none;
  }
  canvas#fx {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 5;
    pointer-events: none;
  }
  .card {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 420px;
    padding: 40px 32px;
    text-align: center;
  }
  .tag {
    font-size: 11px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(123,79,201,0.85);
    margin-bottom: 22px;
  }
  .headline {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: clamp(18px, 6.2vw, 30px);
    letter-spacing: 0;
    text-transform: uppercase;
    line-height: 1.15;
    overflow-wrap: anywhere;
    margin-bottom: 10px;
    text-shadow: 0 0 60px rgba(123,79,201,0.35);
  }
  .percent-wrap {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    gap: 4px;
    margin: 6px 0 2px;
  }
  .percent {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: clamp(110px, 34vw, 168px);
    line-height: 0.85;
    color: var(--crema);
    text-shadow: 0 0 90px rgba(var(--pr-rgb),0.55);
  }
  .percent-sign {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: clamp(38px, 11vw, 56px);
    margin-top: 14px;
    color: var(--pr);
  }
  .percent-sub {
    font-size: 13px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(242,237,228,0.6);
    margin-bottom: 30px;
  }
  .pill {
    display:flex;
    align-items:center;
    gap:10px;
    max-width: 100%;
    border: 1px solid var(--pr);
    border-radius: 2px;
    padding: 14px 20px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--crema);
  }
  .pill-text {
    min-width: 0;
    text-align: left;
  }
  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--pr);
    flex-shrink: 0;
  }
  .footer {
    margin-top: 36px;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: rgba(242,237,228,0.4);
  }
</style>
</head>
<body style="--pr-rgb: 61,153,112;">
  <canvas id="fx"></canvas>
  <div class="card">
    <div class="tag">Alter Ego &middot; Napoli</div>
    <div class="headline">Congratulations!</div>
    <div class="percent-wrap">
      <div class="percent">50</div>
      <div class="percent-sign">%</div>
    </div>
    <div class="percent-sub">Off at checkout</div>
    <div class="pill"><span class="dot"></span><span class="pill-text">Say GREEN at checkout to claim your discount</span></div>
    <div class="footer">@ALTEREGONAPOLI</div>
  </div>

  <script>
  (function () {
    var canvas = document.getElementById('fx');
    var ctx = canvas.getContext('2d');
    var DPR = Math.min(window.devicePixelRatio || 1, 2);

    function resize() {
      canvas.width = window.innerWidth * DPR;
      canvas.height = window.innerHeight * DPR;
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    }
    resize();
    window.addEventListener('resize', resize);

    var W = function () { return window.innerWidth; };
    var H = function () { return window.innerHeight; };

    var PALETTE = ['#3D9970', '#F2EDE4', '#7B4FC9', '#E3B23C'];

    function rand(a, b) { return a + Math.random() * (b - a); }
    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    var confetti = [];
    var sparks = [];
    var running = true;

    function spawnConfetti(n) {
      for (var i = 0; i < n; i++) {
        confetti.push({
          x: rand(0, W()),
          y: rand(-40, -4),
          w: rand(6, 11),
          h: rand(9, 15),
          color: pick(PALETTE),
          vy: rand(2.2, 4.6),
          vx: rand(-1.2, 1.2),
          rot: rand(0, Math.PI * 2),
          vr: rand(-0.15, 0.15),
          life: rand(220, 340)
        });
      }
    }

    function burstFirework(x, y) {
      var count = 46;
      var color = pick(PALETTE);
      for (var i = 0; i < count; i++) {
        var angle = (Math.PI * 2 * i) / count + rand(-0.06, 0.06);
        var speed = rand(2.4, 6.2);
        sparks.push({
          x: x, y: y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          color: Math.random() < 0.25 ? pick(PALETTE) : color,
          life: rand(38, 58),
          age: 0,
          size: rand(1.6, 3)
        });
      }
    }

    function step() {
      ctx.clearRect(0, 0, W(), H());

      for (var i = confetti.length - 1; i >= 0; i--) {
        var c = confetti[i];
        c.x += c.vx; c.y += c.vy; c.rot += c.vr; c.life--;
        if (c.y > H() + 20 || c.life <= 0) { confetti.splice(i, 1); continue; }
        ctx.save();
        ctx.translate(c.x, c.y);
        ctx.rotate(c.rot);
        ctx.fillStyle = c.color;
        ctx.globalAlpha = 0.92;
        ctx.fillRect(-c.w / 2, -c.h / 2, c.w, c.h);
        ctx.restore();
      }

      for (var j = sparks.length - 1; j >= 0; j--) {
        var s = sparks[j];
        s.x += s.vx; s.y += s.vy; s.vy += 0.045; s.age++;
        var t = s.age / s.life;
        if (t >= 1) { sparks.splice(j, 1); continue; }
        ctx.save();
        ctx.globalAlpha = 1 - t;
        ctx.fillStyle = s.color;
        ctx.shadowColor = s.color;
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      if (running || confetti.length || sparks.length) {
        requestAnimationFrame(step);
      }
    }

    spawnConfetti(90);
    setTimeout(function () { spawnConfetti(60); }, 450);

    burstFirework(W() * 0.28, H() * 0.32);
    setTimeout(function () { burstFirework(W() * 0.72, H() * 0.26); }, 300);
    setTimeout(function () { burstFirework(W() * 0.5, H() * 0.38); }, 650);
    setTimeout(function () { burstFirework(W() * 0.35, H() * 0.22); }, 1050);

    requestAnimationFrame(step);
    setTimeout(function () { running = false; }, 3200);
  })();
  </script>
</body>
</html>
